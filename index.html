<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Flappy Bird</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    background: #111;
    font-family: "Segoe UI", system-ui, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
  }

  #game-wrap {
    position: relative;
    overflow: hidden;
  }

  canvas {
    display: block;
    background: linear-gradient(#4ec0ca, #71c5cf);
    touch-action: none;
    cursor: pointer;
    /* Phủ kín màn hình, giữ tỉ lệ 16:9 */
    width: min(100vw, 100vh * 16 / 9);
    height: min(100vh, 100vw * 9 / 16);
    aspect-ratio: 16 / 9;
  }

  /* Overlay (start / game over) */
  #overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    color: #fff;
    text-align: center;
    background: rgba(0, 0, 0, .35);
    backdrop-filter: blur(2px);
    transition: opacity .2s;
  }

  #overlay.hidden { opacity: 0; pointer-events: none; }

  #overlay h1 {
    font-size: 34px;
    letter-spacing: 1px;
    text-shadow: 2px 2px 0 #d5820b;
    color: #ffd23f;
  }

  #overlay p { font-size: 15px; opacity: .95; line-height: 1.5; }

  #overlay .big-score { font-size: 44px; font-weight: 800; }

  #overlay .best { font-size: 15px; opacity: .9; }

  .btn {
    margin-top: 6px;
    padding: 11px 26px;
    font-size: 16px;
    font-weight: 700;
    color: #fff;
    background: #f5a623;
    border: none;
    border-radius: 30px;
    cursor: pointer;
    box-shadow: 0 4px 0 #c17d12;
    transition: transform .05s, box-shadow .05s;
  }
  .btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #c17d12; }

  /* Chọn nhân vật */
  .picker-label { font-size: 13px; opacity: .9; margin-top: 4px; }
  .bird-picker { display: flex; gap: 12px; margin: 2px 0 4px; }
  .bird-opt {
    width: 46px; height: 46px;
    border: 3px solid transparent;
    border-radius: 50%;
    background: rgba(255, 255, 255, .12);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: transform .08s, border-color .12s, background .12s;
  }
  .bird-opt:hover { background: rgba(255, 255, 255, .22); }
  .bird-opt.selected { border-color: #ffd23f; background: rgba(255, 210, 63, .2); }
  .bird-opt.selected .bird-dot { transform: scale(1.05); }
  .bird-dot {
    width: 26px; height: 26px;
    border-radius: 50%;
    border: 2px solid #000;
    display: block;
    transition: transform .1s;
  }

  /* HUD hiệu ứng đang có */
  #fx-hud {
    position: absolute;
    top: 10px;
    left: 10px;
    display: flex;
    gap: 8px;
    z-index: 4;
    pointer-events: none;
  }
  #fx-hud .fx-chip {
    display: none;
    align-items: center;
    gap: 4px;
    padding: 4px 10px;
    border-radius: 20px;
    background: rgba(0, 0, 0, .4);
    color: #fff;
    font-size: 14px;
    font-weight: 700;
    line-height: 1;
  }
  #fx-hud .fx-chip.show { display: flex; }

  #muteBtn {
    position: absolute;
    top: 10px;
    right: 10px;
    width: 40px;
    height: 40px;
    font-size: 18px;
    line-height: 1;
    border: none;
    border-radius: 50%;
    background: rgba(0, 0, 0, .35);
    color: #fff;
    cursor: pointer;
    z-index: 5;
    transition: background .15s;
  }
  #muteBtn:hover { background: rgba(0, 0, 0, .55); }

  #dayNightBtn {
    position: absolute;
    top: 10px;
    right: 58px;
    width: 40px;
    height: 40px;
    font-size: 18px;
    line-height: 1;
    border: none;
    border-radius: 50%;
    background: rgba(0, 0, 0, .35);
    color: #fff;
    cursor: pointer;
    z-index: 5;
    transition: background .15s;
  }
  #dayNightBtn:hover { background: rgba(0, 0, 0, .55); }

  #credit {
    position: fixed;
    right: 10px;
    bottom: 8px;
    z-index: 10;
    font-size: 18px;
    font-weight: 600;
    color: rgba(255, 255, 255, .9);
    text-shadow: 0 1px 2px rgba(0, 0, 0, .6);
    pointer-events: none;
    user-select: none;
  }
</style>
</head>
<body>
  <div id="game-wrap">
    <canvas id="game" width="960" height="540"></canvas>
    <button id="muteBtn" title="Bật/tắt nhạc nền">🔊</button>
    <button id="dayNightBtn" title="Chế độ Ngày/Đêm">🌙</button>
    <div id="fx-hud">
      <div class="fx-chip" id="chip-shield">🛡️ <span id="chip-shield-txt"></span></div>
      <div class="fx-chip" id="chip-slow">🐌 <span id="chip-slow-txt"></span></div>
    </div>
    <div id="overlay">
      <h1>FLAPPY BIRD</h1>
      <p>Nhấn <b>Space</b> / <b>Click</b> / <b>Chạm</b><br />để bay lên.<br />Tránh các ống!<br /><small>P / Esc: tạm dừng</small></p>
      <div class="picker-label">Chọn chim của bạn</div>
      <div class="bird-picker" id="birdPicker"></div>
      <button class="btn" id="startBtn">Bắt đầu</button>
    </div>
  </div>

  <div id="credit">Game design by NguyenDucToan</div>

<script>
(() => {
  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");
  const overlay = document.getElementById("overlay");
  const startBtn = document.getElementById("startBtn");

  // Hệ toạ độ game giữ cố định 960×540; backing store sẽ đặt theo màn hình thật.
  const W = 960;
  const H = 540;

  // Cho canvas render đúng độ phân giải hiển thị (chống mờ trên màn lớn / Retina).
  function resizeCanvas() {
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    // Nếu chưa layout xong (rect = 0) thì bám theo tỉ lệ logic.
    const cssW = rect.width || W;
    const cssH = rect.height || H;
    canvas.width = Math.round(cssW * dpr);
    canvas.height = Math.round(cssH * dpr);
  }
  resizeCanvas();
  window.addEventListener("resize", resizeCanvas);

  // ---- Âm thanh (Web Audio API — không cần file ngoài) ----
  const Sound = (() => {
    let ctx = null;
    let musicOn = true;
    let musicTimer = null;

    function ensure() {
      if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
      if (ctx.state === "suspended") ctx.resume();
      return ctx;
    }

    // phát 1 nốt ngắn
    function beep(freq, dur, type = "square", vol = 0.15, when = 0) {
      const ac = ensure();
      const t = ac.currentTime + when;
      const osc = ac.createOscillator();
      const gain = ac.createGain();
      osc.type = type;
      osc.frequency.setValueAtTime(freq, t);
      gain.gain.setValueAtTime(vol, t);
      gain.gain.exponentialRampToValueAtTime(0.0001, t + dur);
      osc.connect(gain).connect(ac.destination);
      osc.start(t);
      osc.stop(t + dur);
    }

    // hiệu ứng bay: tiếng "vút" đi lên
    function flap() {
      const ac = ensure();
      const t = ac.currentTime;
      const osc = ac.createOscillator();
      const gain = ac.createGain();
      osc.type = "square";
      osc.frequency.setValueAtTime(420, t);
      osc.frequency.exponentialRampToValueAtTime(680, t + 0.08);
      gain.gain.setValueAtTime(0.18, t);
      gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.12);
      osc.connect(gain).connect(ac.destination);
      osc.start(t);
      osc.stop(t + 0.12);
    }

    function point() { beep(880, 0.09, "square", 0.16); beep(1320, 0.09, "square", 0.14, 0.08); }
    function hit()   { beep(200, 0.18, "sawtooth", 0.2); beep(90, 0.3, "sawtooth", 0.2, 0.1); }

    // nhặt vật phẩm: giai điệu đi lên vui tai
    function powerup() {
      beep(660, 0.08, "square", 0.15);
      beep(880, 0.08, "square", 0.15, 0.07);
      beep(1180, 0.12, "square", 0.15, 0.14);
    }
    // khiên chặn va chạm: tiếng "keng" kim loại
    function shieldBreak() {
      beep(1200, 0.05, "square", 0.2);
      beep(700, 0.18, "triangle", 0.18, 0.04);
    }

    // đi vệ sinh: tiếng "tủm" đi xuống vui tai
    function poop() {
      const ac = ensure();
      const t = ac.currentTime;
      const osc = ac.createOscillator();
      const gain = ac.createGain();
      osc.type = "triangle";
      osc.frequency.setValueAtTime(500, t);
      osc.frequency.exponentialRampToValueAtTime(120, t + 0.18);
      gain.gain.setValueAtTime(0.16, t);
      gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.2);
      osc.connect(gain).connect(ac.destination);
      osc.start(t);
      osc.stop(t + 0.2);
    }

    // nhạc nền: vòng lặp giai điệu đơn giản
    const MELODY = [523, 659, 784, 659, 587, 698, 587, 494]; // C E G E D F D B
    function startMusic() {
      if (!musicOn) return;
      stopMusic();
      let i = 0;
      const step = 320; // ms mỗi nốt
      const play = () => {
        const ac = ensure();
        const t = ac.currentTime;
        const osc = ac.createOscillator();
        const gain = ac.createGain();
        osc.type = "triangle";
        osc.frequency.setValueAtTime(MELODY[i % MELODY.length] / 2, t);
        gain.gain.setValueAtTime(0.06, t);
        gain.gain.exponentialRampToValueAtTime(0.0001, t + step / 1000 * 0.9);
        osc.connect(gain).connect(ac.destination);
        osc.start(t);
        osc.stop(t + step / 1000);
        i++;
      };
      play();
      musicTimer = setInterval(play, step);
    }
    function stopMusic() {
      if (musicTimer) { clearInterval(musicTimer); musicTimer = null; }
    }
    function toggleMusic() {
      musicOn = !musicOn;
      if (!musicOn) stopMusic();
      return musicOn;
    }

    return { flap, point, hit, powerup, shieldBreak, poop, startMusic, stopMusic, toggleMusic, ensure,
             get musicOn() { return musicOn; } };
  })();


  // ---- Cấu hình game ----
  const GRAVITY = 0.22;
  const FLAP = -6.0;
  const PIPE_GAP = 190;      // khe hở ban đầu giữa 2 ống
  const MIN_GAP = 130;       // khe hở nhỏ nhất khi đã khó
  const PIPE_WIDTH = 70;
  const PIPE_SPACING = 340;  // khoảng cách ngang giữa các ống
  const PIPE_SPEED = 3.2;    // tốc độ ban đầu
  const MAX_SPEED = 6.0;     // tốc độ tối đa khi đã khó
  const GROUND_H = 90;

  // Độ khó tăng dần theo điểm: nhanh hơn + khe hở hẹp dần (có chặn trên/dưới)
  function currentSpeed() { return Math.min(PIPE_SPEED + score * 0.035, MAX_SPEED); }
  function currentGap()   { return Math.max(PIPE_GAP - score * 1.3, MIN_GAP); }

  // ---- Nhân vật (skin chim) ----
  const SKINS = [
    { id: "yellow", name: "Vàng",       body: "#ffd23f", stroke: "#d5820b", beak: "#ff7f11" },
    { id: "red",    name: "Đỏ",         body: "#ff5b5b", stroke: "#a01e1e", beak: "#ff9d2e" },
    { id: "blue",   name: "Xanh dương", body: "#4aa3ff", stroke: "#1c5aa8", beak: "#ffb02e" },
    { id: "green",  name: "Xanh lá",    body: "#5fd06a", stroke: "#2f7d3a", beak: "#ff9d2e" },
  ];
  let selectedSkin = SKINS.find(s => s.id === localStorage.getItem("flappySkin")) || SKINS[0];

  // ---- Power-up ----
  // types: shield (khiên), star (+3 điểm), slow (chậm ống)
  const POWER = {
    SPAWN_EVERY: 4,     // trung bình cứ ~4 ống thì có 1 vật phẩm
    R: 16,              // bán kính vật phẩm
    SLOW_MS: 4000,      // thời gian hiệu lực chậm
    SLOW_FACTOR: 0.5,   // ống chậm còn 50% tốc độ
    STAR_BONUS: 3,      // sao cộng thêm điểm
  };
  const POWER_TYPES = ["shield", "star", "slow"];
  const POWER_ICON = { shield: "🛡️", star: "⭐", slow: "🐌" };

  // ---- Trạng thái ----
  const STATE = { READY: 0, PLAYING: 1, OVER: 2 };
  let state = STATE.READY;
  let paused = false;
  let lastT = 0;

  let bird, pipes, score, best, frames, groundX;
  best = Number(localStorage.getItem("flappyBest") || 0);

  // ---- Hiệu ứng ----
  let flash = 0;          // độ đậm "chớp trắng" (0..1) khi va chạm
  let shake = 0;          // cường độ rung màn hình (px)
  let countdown = 0;      // thời gian đếm ngược còn lại (ms)
  let floatTexts = [];    // các chữ "+1" bay lên
  let wingPhase = 0;      // pha vỗ cánh liên tục (mượt)
  let isNight = false;    // chế độ Ngày/Đêm
  let weather = "clear";  // thời tiết trang trí: clear/rain/snow/cloudy/fog
  let precip = [];        // hạt mưa / bông tuyết (thuần trang trí)

  // Power-up
  let powerups = [];      // vật phẩm đang bay trên màn
  let hasShield = false;  // đang có khiên bảo vệ
  let slowTimer = 0;      // thời gian còn lại của hiệu ứng chậm (ms)
  let pipesSinceItem = 0; // đếm số ống kể từ vật phẩm gần nhất
  let particles = [];     // hạt lấp lánh khi nhặt vật phẩm
  let feathers = [];      // lông chim rơi (vỗ cánh / va chạm)
  let poops = [];         // các cục 💩 đang rơi
  let poopTimers = [];    // hẹn giờ "đi vệ sinh" sau khi ăn sao (ms)

  // sao trời cho chế độ Đêm (sinh 1 lần, cố định)
  const stars = Array.from({ length: 44 }, () => ({
    x: Math.random() * W,
    y: Math.random() * (H - GROUND_H - 120),
    s: Math.random() * 2 + 1
  }));

  // ---- Cá bơi dưới nước ----
  const FISH_COLORS = ["#ff8c42", "#ffd23f", "#ff5b5b", "#4aa3ff", "#5fd06a", "#ff9d2e"];
  function makeFish() {
    const dir = Math.random() < 0.5 ? 1 : -1;           // 1: bơi sang phải, -1: sang trái
    return {
      x: dir === 1 ? -40 - Math.random() * W : W + 40 + Math.random() * W,
      y: (H - GROUND_H + 16) + Math.random() * (GROUND_H - 30),
      dir,
      speed: 0.4 + Math.random() * 0.9,
      size: 7 + Math.random() * 8,
      color: FISH_COLORS[Math.floor(Math.random() * FISH_COLORS.length)],
      wig: Math.random() * Math.PI * 2,                 // pha ngoáy đuôi
      target: null,                                     // cục 💩 đang đuổi theo (nếu có)
      biteCd: 0,                                        // nghỉ giữa các miếng đớp (frame)
      jumping: false,                                   // đang nhảy vọt khỏi mặt nước?
      jvy: 0,                                            // vận tốc dọc khi nhảy
      jvx: 0,                                            // vận tốc ngang khi nhảy (âm/dương = trái/phải)
      jumpCd: 200 + Math.random() * 700                 // đếm lùi tới lần nhảy kế (frame)
    };
  }
  const fishes = Array.from({ length: 7 }, () => {
    const f = makeFish();
    f.x = Math.random() * W;                            // rải sẵn khắp màn khi khởi động
    return f;
  });
  let waterT = 0;   // pha hoạt hình mặt nước (luôn tăng dần)

  function reset() {
    bird = { x: 160, y: H / 2, r: 15, vy: 0, rot: 0 };
    pipes = [];
    score = 0;
    frames = 0;
    groundX = 0;
    flash = 0;
    shake = 0;
    countdown = 0;
    floatTexts = [];
    powerups = [];
    particles = [];
    feathers = [];
    poops = [];
    poopTimers = [];
    initPrecip();      // dựng lại mảng hạt mưa/tuyết theo thời tiết hiện tại
    for (const f of fishes) { f.target = null; f.biteCd = 0; f.jumping = false; }   // cá thôi đuổi mồi của lượt trước
    hasShield = false;
    slowTimer = 0;
    pipesSinceItem = 0;
    updateFxHud();
  }

  function spawnPipe() {
    const gap = currentGap();
    const margin = 60;
    const minTop = margin;
    const maxTop = H - GROUND_H - gap - margin;
    const top = minTop + Math.random() * (maxTop - minTop);
    pipes.push({ x: W, top: top, gap: gap, passed: false });

    // đặt vật phẩm giữa khe ống kế tiếp (đủ thưa để không quá dễ)
    pipesSinceItem++;
    if (pipesSinceItem >= POWER.SPAWN_EVERY - 1 &&
        Math.random() < 0.55 &&
        score >= 2) {
      pipesSinceItem = 0;
      const type = POWER_TYPES[Math.floor(Math.random() * POWER_TYPES.length)];
      powerups.push({
        x: W + PIPE_SPACING / 2,        // rơi vào giữa khoảng cách 2 ống
        y: top + gap / 2,
        type,
        r: POWER.R,
        got: false,
        bob: Math.random() * Math.PI * 2 // pha nhấp nhô
      });
    }
  }

  function flap() {
    if (state === STATE.PLAYING && !paused && countdown <= 0) {
      bird.vy = FLAP;
      Sound.flap();
      // rơi vài sợi lông từ sau lưng chim khi vỗ cánh
      spawnFeathers(bird.x - 6, bird.y + 4, 1 + (Math.random() < 0.35 ? 1 : 0));
    }
  }

  function startGame() {
    reset();
    randomizeDayNight();            // mỗi lượt chơi random Ngày/Đêm
    randomizeWeather();             // ...và random thời tiết trang trí
    paused = false;
    state = STATE.PLAYING;
    countdown = 3000;               // đếm ngược 3-2-1 trước khi vào cuộc
    overlay.classList.add("hidden");
    Sound.ensure();
    Sound.startMusic();
  }

  // random chế độ Ngày/Đêm và đồng bộ icon nút
  function randomizeDayNight() {
    isNight = Math.random() < 0.5;
    dayNightBtn.textContent = isNight ? "☀️" : "🌙";
    dayNightBtn.title = isNight ? "Chuyển sang Ngày" : "Chuyển sang Đêm";
  }

  // random thời tiết trang trí cho lượt chơi (song song với Ngày/Đêm)
  const WEATHERS = ["clear", "rain", "snow", "cloudy", "fog"];
  function randomizeWeather() {
    weather = WEATHERS[Math.floor(Math.random() * WEATHERS.length)];
    initPrecip();
  }

  // dựng mảng hạt mưa/tuyết theo thời tiết; các kiểu khác không có hạt rơi
  function initPrecip() {
    precip = [];
    if (weather === "rain") {
      for (let i = 0; i < 140; i++) {
        precip.push({
          x: Math.random() * (W + 60) - 30,
          y: Math.random() * H,
          len: 12 + Math.random() * 10,     // độ dài vệt mưa
          spd: 9 + Math.random() * 5        // tốc độ rơi
        });
      }
    } else if (weather === "snow") {
      for (let i = 0; i < 90; i++) {
        precip.push({
          x: Math.random() * (W + 60) - 30,
          y: Math.random() * H,
          r: 1.5 + Math.random() * 2.5,     // kích thước bông
          spd: 0.8 + Math.random() * 1.2,   // rơi chậm
          sway: Math.random() * Math.PI * 2, // pha chao ngang
          swaySpeed: 0.02 + Math.random() * 0.03
        });
      }
    }
  }

  function gameOver() {
    state = STATE.OVER;
    paused = false;
    flash = 1;      // chớp trắng
    shake = 14;     // rung màn hình
    spawnFeathers(bird.x, bird.y, 14, true);  // nổ tung một chùm lông
    Sound.stopMusic();
    Sound.hit();
    if (score > best) {
      best = score;
      localStorage.setItem("flappyBest", best);
    }
    showOverlay(`
      <div class="big-score">${score}</div>
      <div class="best">Điểm cao nhất: ${best}</div>
      <button class="btn" id="startBtn">Chơi lại</button>
    `, "GAME OVER");
  }

  function showOverlay(html, title) {
    overlay.innerHTML = `<h1>${title}</h1>` + html;
    overlay.classList.remove("hidden");
    overlay.querySelector("#startBtn").addEventListener("click", (e) => {
      e.stopPropagation();
      startGame();
    });
  }

  // ---- Tạm dừng ----
  function togglePause() {
    if (state !== STATE.PLAYING) return;
    paused = !paused;
    if (paused) {
      Sound.stopMusic();
      overlay.innerHTML =
        `<h1>TẠM DỪNG</h1>` +
        `<p>Nhấn <b>P</b> / <b>Esc</b> hoặc nút bên dưới để tiếp tục</p>` +
        `<button class="btn" id="resumeBtn">Tiếp tục</button>`;
      overlay.classList.remove("hidden");
      overlay.querySelector("#resumeBtn").addEventListener("click", (e) => {
        e.stopPropagation();
        togglePause();
      });
    } else {
      overlay.classList.add("hidden");
      countdown = 3000;             // đếm ngược lại khi tiếp tục
      Sound.startMusic();
    }
  }

  // Va chạm hình tròn (chim) với hình chữ nhật (ống): tìm điểm gần nhất trên
  // hình chữ nhật rồi so khoảng cách với bán kính.
  function circleHitsRect(cx, cy, r, rx, ry, rw, rh) {
    const nx = Math.max(rx, Math.min(cx, rx + rw));
    const ny = Math.max(ry, Math.min(cy, ry + rh));
    const dx = cx - nx, dy = cy - ny;
    return dx * dx + dy * dy < r * r;
  }

  // ---- Power-up: nhặt & hiệu ứng ----
  function collectPowerup(it) {
    Sound.powerup();
    const color = it.type === "shield" ? "#7ad7ff"
                : it.type === "star"   ? "#ffe14d"
                : "#b58cff";
    spawnParticles(it.x, it.y, color, 18);

    if (it.type === "shield") {
      hasShield = true;
    } else if (it.type === "star") {
      score += POWER.STAR_BONUS;
      floatTexts.push({ x: it.x, y: it.y - 10, vy: -1.2, life: 1, text: "+" + POWER.STAR_BONUS });
      poopTimers.push(1000);   // 1 giây sau chim sẽ "đi vệ sinh" 💩
    } else if (it.type === "slow") {
      slowTimer = POWER.SLOW_MS;
    }
    updateFxHud();
  }

  // chim "đi vệ sinh": thả 1 cục 💩 rơi xuống từ vị trí chim
  function dropPoop() {
    if (state !== STATE.PLAYING) return;
    Sound.poop();
    poops.push({ x: bird.x - 6, y: bird.y + bird.r, vy: 0.5, rot: 0, vr: 0.15,
                 state: "falling", eaten: false, bites: 20, maxBites: 20, bob: 0 });
  }

  function spawnParticles(x, y, color, n) {
    for (let i = 0; i < n; i++) {
      const a = Math.random() * Math.PI * 2;
      const sp = 1.5 + Math.random() * 3;
      particles.push({
        x, y,
        vx: Math.cos(a) * sp,
        vy: Math.sin(a) * sp - 1,
        life: 1,
        color,
        size: 2 + Math.random() * 2
      });
    }
  }

  // lông chim rơi: chao đảo đung đưa, xoay nhẹ, mờ dần. burst=true khi va chạm
  function spawnFeathers(x, y, n, burst) {
    for (let i = 0; i < n; i++) {
      const a = Math.random() * Math.PI * 2;
      const sp = burst ? 2 + Math.random() * 3.5 : 0.6 + Math.random() * 1.2;
      feathers.push({
        x, y,
        vx: Math.cos(a) * sp - (burst ? 0 : 0.6),  // hơi trôi về sau khi vỗ nhẹ
        vy: burst ? Math.sin(a) * sp - 1.5 : -0.4 - Math.random() * 0.8,
        rot: Math.random() * Math.PI * 2,
        vr: (Math.random() - 0.5) * 0.2,
        sway: Math.random() * Math.PI * 2,   // pha lắc lư
        swaySpeed: 0.04 + Math.random() * 0.05,
        size: 5 + Math.random() * 3,
        color: selectedSkin.body,
        life: 1,
        fade: 0.004 + Math.random() * 0.004
      });
    }
  }

  // cập nhật các "chip" trạng thái trên HUD
  function updateFxHud() {
    const cs = document.getElementById("chip-shield");
    const cl = document.getElementById("chip-slow");
    cs.classList.toggle("show", !!hasShield);
    cl.classList.toggle("show", slowTimer > 0);
    if (slowTimer > 0) {
      document.getElementById("chip-slow-txt").textContent = (slowTimer / 1000).toFixed(1) + "s";
    }
  }

  // ---- Vòng lặp cập nhật ----
  // dt = hệ số thời gian, chuẩn hóa theo 60fps (1.0 = đúng 60fps)
  function update(dt) {
    if (state !== STATE.PLAYING || paused) return;

    // đếm ngược 3-2-1: đóng băng gameplay cho tới khi đếm xong
    if (countdown > 0) {
      countdown = Math.max(0, countdown - dt * (1000 / 60));
      return;
    }

    frames++;

    // hiệu ứng chậm thời gian
    if (slowTimer > 0) {
      slowTimer = Math.max(0, slowTimer - dt * (1000 / 60));
      updateFxHud();
    }
    const slowMul = slowTimer > 0 ? POWER.SLOW_FACTOR : 1;
    const speed = currentSpeed() * slowMul * dt;

    // chim
    bird.vy += GRAVITY * dt;
    bird.y += bird.vy * dt;
    bird.rot = Math.max(-0.7, Math.min(1.2, bird.vy / 3.5));

    // sinh ống (khoảng cách ngang cố định, không còn spawn đôi ở frame đầu)
    if (!pipes.length || W - pipes[pipes.length - 1].x >= PIPE_SPACING) {
      spawnPipe();
    }

    // di chuyển ống
    for (const p of pipes) {
      p.x -= speed;
      if (!p.passed && p.x + PIPE_WIDTH < bird.x) {
        p.passed = true;
        score++;
        Sound.point();
        // chữ "+1" bay lên tại vị trí chim
        floatTexts.push({ x: bird.x + 18, y: bird.y - 22, vy: -1.2, life: 1 });
      }
    }
    pipes = pipes.filter(p => p.x + PIPE_WIDTH > 0);

    // nền cuộn
    groundX = (groundX - speed) % 24;

    // chữ "+1" bay lên rồi mờ dần
    for (const f of floatTexts) {
      f.y += f.vy * dt;
      f.life -= 0.02 * dt;
    }
    floatTexts = floatTexts.filter(f => f.life > 0);

    // vật phẩm: di chuyển theo nền, nhấp nhô, kiểm tra nhặt
    for (const it of powerups) {
      it.x -= speed;
      it.bob += 0.08 * dt;
      if (!it.got) {
        const dx = bird.x - it.x, dy = bird.y - it.y;
        if (dx * dx + dy * dy < (bird.r + it.r) * (bird.r + it.r)) {
          it.got = true;
          collectPowerup(it);
        }
      }
    }
    powerups = powerups.filter(it => !it.got && it.x + it.r > 0);

    // hạt lấp lánh
    for (const pt of particles) {
      pt.x += pt.vx * dt;
      pt.y += pt.vy * dt;
      pt.vy += 0.12 * dt;
      pt.life -= 0.035 * dt;
    }
    particles = particles.filter(pt => pt.life > 0);

    // hẹn giờ "đi vệ sinh": ăn sao xong 1 giây thì thả 💩
    for (let i = 0; i < poopTimers.length; i++) {
      poopTimers[i] -= dt * (1000 / 60);
      if (poopTimers[i] <= 0) dropPoop();
    }
    poopTimers = poopTimers.filter(ms => ms > 0);

    // 💩 rơi trên không rồi nổi lềnh bềnh trên mặt nước; cá bơi tới đớp (xử lý ở stepWater)
    const surfY = H - GROUND_H;
    for (const pp of poops) {
      if (pp.state === "falling") {
        pp.vy += 0.14 * dt;
        if (pp.vy > 3) pp.vy = 3;      // giới hạn tốc rơi cho dễ theo dõi
        pp.y += pp.vy * dt;
        pp.x -= speed * 0.25;          // cuộn nhẹ thôi để không trôi khỏi màn
        pp.rot += pp.vr * dt;
        // chạm mặt nước: tóe bọt 1 lần rồi chuyển sang trạng thái nổi lềnh bềnh
        if (pp.y >= surfY) {
          pp.state = "floating";
          pp.vy = 1.2;                 // còn trớn nên chìm nhẹ một chút
          spawnParticles(pp.x, surfY, "#bfe6ff", 12);
        }
      } else {
        // đang nổi: chìm nhẹ xuống rồi bị lực đẩy đưa lên, dập dềnh quanh mặt nước
        pp.bob += 0.08 * dt;
        const restY = surfY + 6 + Math.sin(pp.bob) * 3;   // mức nổi mục tiêu (ngay dưới mặt nước)
        pp.vy += (restY - pp.y) * 0.02 * dt;              // kéo về mức nổi (như lò xo)
        pp.vy *= Math.pow(0.9, dt);                        // cản nước cho khỏi nảy mãi
        pp.y += pp.vy * dt;
        pp.rot += pp.vr * 0.3 * dt;
      }
      if (pp.x < 16) pp.x = 16;             // không cho lọt khỏi mép trái
    }
    // bỏ phân đã bị cá ăn hoặc trôi ra khỏi màn
    poops = poops.filter(pp => !pp.eaten && pp.x + 14 > 0);

    // va chạm đất / trần
    if (bird.y + bird.r >= H - GROUND_H) {
      bird.y = H - GROUND_H - bird.r;
      if (hasShield) {
        hasShield = false;
        updateFxHud();
        Sound.shieldBreak();
        shake = 10;
        flash = 0.5;
        spawnParticles(bird.x, bird.y, "#7ad7ff", 16);
        spawnFeathers(bird.x, bird.y, 8, true);
        bird.vy = FLAP;   // bật nảy lên
        return;
      }
      return gameOver();
    }
    if (bird.y - bird.r <= 0) {
      bird.y = bird.r;
      bird.vy = 0;
    }

    // va chạm ống (hình tròn thật với 2 hình chữ nhật trên/dưới)
    for (const p of pipes) {
      const by = p.top + p.gap;
      const hitTop = circleHitsRect(bird.x, bird.y, bird.r, p.x, 0, PIPE_WIDTH, p.top);
      const hitBottom = circleHitsRect(bird.x, bird.y, bird.r, p.x, by, PIPE_WIDTH, H - GROUND_H - by);
      if (hitTop || hitBottom) {
        if (hasShield) {
          hasShield = false;
          updateFxHud();
          Sound.shieldBreak();
          shake = 10;
          flash = 0.5;
          spawnParticles(bird.x, bird.y, "#7ad7ff", 16);
          spawnFeathers(bird.x, bird.y, 8, true);
          // đẩy chim ra khỏi ống để không kẹt lại va chạm ngay frame sau
          bird.vy = FLAP * 0.8;
          bird.x = Math.max(bird.x, p.x + PIPE_WIDTH + bird.r + 2);
          return;
        }
        return gameOver();
      }
    }
  }

  // ---- Vẽ ----
  function drawPipe(p) {
    const grad = ctx.createLinearGradient(p.x, 0, p.x + PIPE_WIDTH, 0);
    grad.addColorStop(0, "#5aab3a");
    grad.addColorStop(0.5, "#7ed957");
    grad.addColorStop(1, "#4a8f2e");
    ctx.fillStyle = grad;
    ctx.strokeStyle = "#3a6b23";
    ctx.lineWidth = 3;

    const lip = 18, lipW = 8;
    // ống trên
    ctx.fillRect(p.x, 0, PIPE_WIDTH, p.top);
    ctx.strokeRect(p.x, 0, PIPE_WIDTH, p.top);
    ctx.fillRect(p.x - lipW, p.top - lip, PIPE_WIDTH + lipW * 2, lip);
    ctx.strokeRect(p.x - lipW, p.top - lip, PIPE_WIDTH + lipW * 2, lip);
    // ống dưới
    const by = p.top + p.gap;
    ctx.fillRect(p.x, by, PIPE_WIDTH, H - GROUND_H - by);
    ctx.strokeRect(p.x, by, PIPE_WIDTH, H - GROUND_H - by);
    ctx.fillRect(p.x - lipW, by, PIPE_WIDTH + lipW * 2, lip);
    ctx.strokeRect(p.x - lipW, by, PIPE_WIDTH + lipW * 2, lip);
  }

  function drawBird() {
    ctx.save();
    ctx.translate(bird.x, bird.y);
    ctx.rotate(bird.rot);

    // thân
    ctx.fillStyle = selectedSkin.body;
    ctx.strokeStyle = selectedSkin.stroke;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(0, 0, bird.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();

    // cánh — vỗ mượt: vỗ nhanh hơn khi vừa bay lên (vy âm)
    ctx.fillStyle = "#fff";
    ctx.beginPath();
    const wingFlap = Math.sin(wingPhase) * 0.9;
    ctx.ellipse(-4, 2, 7, 5 + Math.sin(wingPhase) * 1.5, wingFlap, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();

    // mắt
    ctx.fillStyle = "#fff";
    ctx.beginPath();
    ctx.arc(6, -5, 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = "#000";
    ctx.beginPath();
    ctx.arc(8, -5, 2.3, 0, Math.PI * 2);
    ctx.fill();

    // mỏ
    ctx.fillStyle = selectedSkin.beak;
    ctx.beginPath();
    ctx.moveTo(bird.r - 2, -2);
    ctx.lineTo(bird.r + 7, 0);
    ctx.lineTo(bird.r - 2, 4);
    ctx.closePath();
    ctx.fill();

    ctx.restore();

    // vòng khiên bảo vệ (vẽ ngoài phép xoay để không nghiêng)
    if (hasShield) {
      ctx.save();
      const pulse = 0.5 + 0.5 * Math.sin(wingPhase * 2);
      ctx.strokeStyle = `rgba(122, 215, 255, ${0.5 + pulse * 0.4})`;
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(bird.x, bird.y, bird.r + 7, 0, Math.PI * 2);
      ctx.stroke();
      ctx.fillStyle = `rgba(122, 215, 255, ${0.08 + pulse * 0.08})`;
      ctx.fill();
      ctx.restore();
    }
  }

  // Mặt nước có sóng gợn + cá bơi (thay cho mặt đất)
  function drawWater() {
    const surfY = H - GROUND_H;

    // khối nước (gradient theo độ sâu)
    const g = ctx.createLinearGradient(0, surfY, 0, H);
    if (isNight) {
      g.addColorStop(0, "#1c3f6e");
      g.addColorStop(1, "#0a1f3d");
    } else {
      g.addColorStop(0, "#3fa9d6");
      g.addColorStop(1, "#1c6fa8");
    }
    ctx.fillStyle = g;
    ctx.fillRect(-30, surfY, W + 60, GROUND_H + 30);

    // đàn cá bơi (vẽ trước lằn sóng để mặt nước phủ lên phần trên)
    for (const f of fishes) drawFish(f);

    // lằn sóng gợn ở mặt nước (sin dịch chuyển theo waterT)
    ctx.strokeStyle = isNight ? "rgba(180,210,255,0.35)" : "rgba(255,255,255,0.55)";
    ctx.lineWidth = 2;
    ctx.beginPath();
    for (let x = -30; x <= W + 30; x += 6) {
      const y = surfY + 4 + Math.sin((x * 0.04) + waterT) * 3;
      if (x === -30) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.stroke();

    // dải sáng lấp lánh mặt nước
    ctx.fillStyle = isNight ? "rgba(180,210,255,0.12)" : "rgba(255,255,255,0.18)";
    ctx.fillRect(-30, surfY, W + 60, 6);
  }

  // vẽ 1 con cá (thân bầu dục + đuôi ngoáy)
  function drawFish(f) {
    ctx.save();
    ctx.translate(f.x, f.y + Math.sin(f.wig) * 2);
    if (f.jumping) ctx.rotate(f.jvy * 0.06 * f.dir);   // chúi theo cung nhảy (đầu lên khi vọt, chúi xuống khi rơi)
    ctx.scale(f.dir, 1);   // lật theo hướng bơi
    const s = f.size;

    // đuôi ngoáy qua lại
    const tail = Math.sin(f.wig) * 0.4;
    ctx.fillStyle = f.color;
    ctx.beginPath();
    ctx.moveTo(-s * 0.9, 0);
    ctx.lineTo(-s * 1.6, -s * 0.6 + tail * s);
    ctx.lineTo(-s * 1.6, s * 0.6 + tail * s);
    ctx.closePath();
    ctx.fill();

    // thân
    ctx.beginPath();
    ctx.ellipse(0, 0, s, s * 0.6, 0, 0, Math.PI * 2);
    ctx.fill();

    // mắt
    ctx.fillStyle = "#fff";
    ctx.beginPath();
    ctx.arc(s * 0.45, -s * 0.15, s * 0.18, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = "#000";
    ctx.beginPath();
    ctx.arc(s * 0.5, -s * 0.15, s * 0.09, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
  }

  // cập nhật vị trí cá + sóng (chạy cả khi chưa vào cuộc để nền luôn sống động)
  function stepWater(dt) {
    waterT += 0.05 * dt;
    const surfY = H - GROUND_H;

    // Gán mồi: mỗi cục 💩 đang chìm hút tối đa 5 con cá rảnh gần nhất xúm vào
    const CHASERS_PER_FOOD = 5;
    for (const f of fishes) {
      if (f.target || f.biteCd > 0) continue;           // cá đang bận đi ăn / vừa đớp xong đang nghỉ
      let best = null, bestD = Infinity;
      for (const food of poops) {
        if (food.state !== "floating" || food.eaten) continue;
        // đếm số cá đang đuổi cục này; đủ 3 thì bỏ qua
        let chasers = 0;
        for (const o of fishes) if (o.target === food) chasers++;
        if (chasers >= CHASERS_PER_FOOD) continue;
        const dx = f.x - food.x, dy = f.y - food.y;
        const d = dx * dx + dy * dy;
        if (d < bestD) { bestD = d; best = food; }
      }
      if (best) f.target = best;
    }

    for (const f of fishes) {
      // ---- Nhảy vọt khỏi mặt nước (thỉnh thoảng, chỉ khi đang bơi tự do) ----
      if (f.jumping) {
        f.jvy += 0.12 * dt;                              // trọng lực kéo xuống
        f.y += f.jvy * dt;
        f.x += f.jvx * dt;                               // bay theo hướng đã chọn (trái hoặc phải)
        f.wig += 0.25 * dt;
        if (f.jvy > 0 && f.y >= surfY) {                 // rơi lại chạm mặt nước
          f.y = surfY + 2;
          f.jumping = false;
          f.jumpCd = 300 + Math.random() * 600;          // nghỉ vài giây rồi mới nhảy tiếp
          spawnParticles(f.x, surfY, "#bfe6ff", 10);     // tóe nước khi đáp
        }
        continue;                                        // đang bay thì bỏ qua logic bơi bên dưới
      }
      if (f.jumpCd > 0) f.jumpCd -= dt;

      if (f.biteCd > 0) f.biteCd -= dt;                  // đếm lùi thời gian nghỉ giữa 2 miếng

      // mục tiêu đã bị ăn / trôi mất thì bỏ theo dõi
      if (f.target && (f.target.eaten || f.target.state !== "floating")) f.target = null;

      if (f.target) {
        // đang đi ăn: bơi thẳng tới cục 💩, nhanh hơn bình thường
        const food = f.target;
        const dx = food.x - f.x, dy = food.y - f.y;
        const dist = Math.hypot(dx, dy) || 1;
        f.dir = dx >= 0 ? 1 : -1;
        const sp = f.speed + 1.4;
        f.x += (dx / dist) * sp * dt;
        f.y += (dy / dist) * sp * dt;
        f.wig += (0.2 + f.speed * 0.05) * dt;
        if (dist < f.size + 8) {                         // đớp trúng một miếng!
          food.bites--;
          spawnParticles(food.x, food.y, "#bfe6ff", 6);  // bọt khí khi đớp
          f.target = null;                                // đớp xong lượn ra, nhường con khác
          f.biteCd = 55 + Math.random() * 35;             // nghỉ ~1 giây rồi mới quay lại đớp tiếp
          if (food.bites <= 0) food.eaten = true;         // hết sạch mới biến mất
        }
      } else {
        // bơi tự do qua lại như cũ
        f.x += f.speed * f.dir * dt;
        f.wig += (0.1 + f.speed * 0.05) * dt;
        // thỉnh thoảng bật nhảy vọt lên khỏi mặt nước (khi đang ở dưới sâu)
        if (f.jumpCd <= 0 && f.y > surfY + 12) {
          f.jumping = true;
          f.jvy = -(4.4 + Math.random() * 2);            // lực bật lên
          f.dir = Math.random() < 0.5 ? 1 : -1;          // chọn ngẫu nhiên nhảy sang trái hay phải
          f.jvx = f.dir * (0.8 + Math.random() * 1.6);   // vận tốc ngang theo hướng đó
          spawnParticles(f.x, surfY, "#bfe6ff", 8);      // tóe nước khi lao lên
          continue;
        }
        // bơi ra khỏi màn thì tái sinh ở phía đối diện
        if (f.dir === 1 && f.x - f.size * 1.6 > W + 40) {
          f.x = -40; f.y = (surfY + 16) + Math.random() * (GROUND_H - 30);
        } else if (f.dir === -1 && f.x + f.size * 1.6 < -40) {
          f.x = W + 40; f.y = (surfY + 16) + Math.random() * (GROUND_H - 30);
        }
      }
    }
  }

  // ---- Thời tiết (thuần trang trí) ----
  // Lớp ám màu trời theo kiểu thời tiết — vẽ ngay sau nền trời.
  function drawWeatherTint() {
    let tint = null;
    if (weather === "rain")   tint = isNight ? "rgba(20,30,55,0.35)"  : "rgba(80,90,110,0.28)";
    else if (weather === "cloudy") tint = isNight ? "rgba(30,40,60,0.25)" : "rgba(150,155,165,0.22)";
    else if (weather === "fog") tint = isNight ? "rgba(40,50,70,0.20)" : "rgba(210,215,225,0.18)";
    if (tint) { ctx.fillStyle = tint; ctx.fillRect(-30, -30, W + 60, H + 60); }
  }

  // Mây dày thêm cho kiểu "cloudy" (cuộn chậm, nhiều lớp mờ hơn mây mặc định).
  function drawExtraClouds() {
    if (weather !== "cloudy") return;
    ctx.fillStyle = isNight ? "rgba(190,200,225,0.28)" : "rgba(255,255,255,0.85)";
    for (let i = 0; i < 5; i++) {
      const baseY = 60 + i * 55;
      const cx = ((i * 210 - frames * 0.22) % (W + 200) + W + 200) % (W + 200) - 100;
      ctx.beginPath();
      ctx.arc(cx, baseY, 30, 0, Math.PI * 2);
      ctx.arc(cx + 34, baseY + 8, 38, 0, Math.PI * 2);
      ctx.arc(cx + 74, baseY, 28, 0, Math.PI * 2);
      ctx.arc(cx + 40, baseY - 14, 26, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // Mưa: các vệt chéo mảnh. Tuyết: các bông tròn mềm.
  function drawPrecip() {
    if (weather === "rain") {
      ctx.strokeStyle = isNight ? "rgba(170,195,235,0.55)" : "rgba(200,220,245,0.75)";
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      for (const d of precip) {
        ctx.moveTo(d.x, d.y);
        ctx.lineTo(d.x - d.len * 0.35, d.y + d.len);   // nghiêng ngược hướng bay ngang
      }
      ctx.stroke();
    } else if (weather === "snow") {
      ctx.fillStyle = isNight ? "rgba(230,238,255,0.9)" : "rgba(255,255,255,0.95)";
      for (const d of precip) {
        ctx.beginPath();
        ctx.arc(d.x, d.y, d.r, 0, Math.PI * 2);
        ctx.fill();
      }
    }
  }

  // Sương mù: lớp phủ mờ toàn màn, dày dần về phía dưới.
  function drawFog() {
    if (weather !== "fog") return;
    const g = ctx.createLinearGradient(0, 0, 0, H);
    if (isNight) {
      g.addColorStop(0, "rgba(120,135,160,0.18)");
      g.addColorStop(1, "rgba(120,135,160,0.42)");
    } else {
      g.addColorStop(0, "rgba(235,238,244,0.22)");
      g.addColorStop(1, "rgba(225,230,238,0.5)");
    }
    ctx.fillStyle = g;
    ctx.fillRect(-30, -30, W + 60, H + 60);
  }

  function drawClouds() {
    ctx.fillStyle = isNight ? "rgba(200,210,235,0.25)" : "rgba(255,255,255,0.7)";
    const y = 90;
    for (let i = 0; i < 3; i++) {
      const cx = ((i * 160 - frames * 0.3) % (W + 120) + W + 120) % (W + 120) - 60;
      ctx.beginPath();
      ctx.arc(cx, y + i * 40, 22, 0, Math.PI * 2);
      ctx.arc(cx + 24, y + i * 40, 28, 0, Math.PI * 2);
      ctx.arc(cx + 52, y + i * 40, 20, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function drawScore() {
    if (state === STATE.PLAYING || state === STATE.OVER) {
      ctx.fillStyle = "#fff";
      ctx.strokeStyle = "#000";
      ctx.lineWidth = 4;
      ctx.font = "bold 46px Segoe UI, sans-serif";
      ctx.textAlign = "center";
      ctx.strokeText(score, W / 2, 80);
      ctx.fillText(score, W / 2, 80);
    }
  }

  // nền trời (vẽ trong canvas để đổi Ngày/Đêm được), có overscan cho rung
  function drawBackground() {
    const g = ctx.createLinearGradient(0, 0, 0, H);
    if (isNight) {
      g.addColorStop(0, "#0b1a3a");
      g.addColorStop(1, "#2a4680");
    } else {
      g.addColorStop(0, "#4ec0ca");
      g.addColorStop(1, "#8fd7df");
    }
    ctx.fillStyle = g;
    ctx.fillRect(-30, -30, W + 60, H + 60);

    if (isNight) {
      // sao
      ctx.fillStyle = "rgba(255,255,255,0.85)";
      for (const s of stars) ctx.fillRect(s.x, s.y, s.s, s.s);
      // trăng khuyết
      const mx = W - 130, my = 95;
      ctx.fillStyle = "#fdf6c9";
      ctx.beginPath(); ctx.arc(mx, my, 32, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = "#0b1a3a";
      ctx.beginPath(); ctx.arc(mx + 13, my - 7, 28, 0, Math.PI * 2); ctx.fill();
    } else {
      // mặt trời nhạt
      ctx.fillStyle = "rgba(255, 241, 168, 0.6)";
      ctx.beginPath(); ctx.arc(W - 120, 95, 40, 0, Math.PI * 2); ctx.fill();
    }
  }

  function drawFloatTexts() {
    ctx.textAlign = "center";
    ctx.font = "bold 30px Segoe UI, sans-serif";
    ctx.lineWidth = 3;
    for (const f of floatTexts) {
      ctx.globalAlpha = Math.max(0, Math.min(1, f.life));
      ctx.fillStyle = "#fff";
      ctx.strokeStyle = "#d5820b";
      const txt = f.text || "+1";
      ctx.strokeText(txt, f.x, f.y);
      ctx.fillText(txt, f.x, f.y);
    }
    ctx.globalAlpha = 1;
  }

  function drawPowerups() {
    for (const it of powerups) {
      const yy = it.y + Math.sin(it.bob) * 4;   // nhấp nhô nhẹ
      // hào quang
      const glow = it.type === "shield" ? "rgba(122,215,255,0.9)"
                 : it.type === "star"   ? "rgba(255,225,77,0.9)"
                 : "rgba(181,140,255,0.9)";
      ctx.save();
      ctx.shadowColor = glow;
      ctx.shadowBlur = 16;
      // đĩa nền tròn
      ctx.fillStyle = "rgba(255,255,255,0.92)";
      ctx.beginPath();
      ctx.arc(it.x, yy, it.r, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
      // viền
      ctx.strokeStyle = it.type === "shield" ? "#3aa0d8"
                      : it.type === "star"   ? "#e0a800"
                      : "#7d54c9";
      ctx.lineWidth = 2.5;
      ctx.beginPath();
      ctx.arc(it.x, yy, it.r, 0, Math.PI * 2);
      ctx.stroke();
      // icon
      ctx.font = "20px Segoe UI, sans-serif";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(POWER_ICON[it.type], it.x, yy + 1);
      ctx.textBaseline = "alphabetic";
    }
  }

  // Vẽ cục phân bằng vector (không dùng emoji bitmap) → luôn nét, không màng mờ.
  function drawPoopShape(r) {
    // Thân: các ụ chồng lên nhau, tô đặc màu nâu (union tự nhiên khi đè nhau)
    const body = ["#8a5a2c", "#8a5a2c", "#8a5a2c", "#8a5a2c"];
    const blobs = [
      [-r * 0.35, r * 0.45, r * 0.62],
      [ r * 0.35, r * 0.45, r * 0.58],
      [ 0,        r * 0.02, r * 0.55],
      [ 0,       -r * 0.50, r * 0.34],
    ];
    for (let i = 0; i < blobs.length; i++) {
      ctx.fillStyle = body[i];
      ctx.beginPath();
      ctx.arc(blobs[i][0], blobs[i][1], blobs[i][2], 0, Math.PI * 2);
      ctx.fill();
    }
    // Viền đáy đậm hơn cho có khối
    ctx.fillStyle = "rgba(0,0,0,0.12)";
    ctx.beginPath();
    ctx.ellipse(0, r * 0.85, r * 0.7, r * 0.22, 0, 0, Math.PI * 2);
    ctx.fill();
    // Bắt sáng nhẹ phía trên
    ctx.fillStyle = "rgba(255,255,255,0.16)";
    ctx.beginPath();
    ctx.arc(-r * 0.15, -r * 0.58, r * 0.13, 0, Math.PI * 2);
    ctx.fill();
    // Mắt trắng + con ngươi
    for (const ex of [-0.18, 0.18]) {
      ctx.fillStyle = "#fff";
      ctx.beginPath();
      ctx.arc(ex * r, -r * 0.48, r * 0.13, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = "#222";
      ctx.beginPath();
      ctx.arc(ex * r, -r * 0.46, r * 0.06, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function drawPoops() {
    ctx.shadowBlur = 0;               // không đổ bóng
    ctx.shadowColor = "transparent";
    for (const pp of poops) {
      if (pp.eaten) continue;
      ctx.save();
      ctx.translate(pp.x, pp.y);
      ctx.rotate(pp.rot);
      // teo dần theo số miếng còn lại (nhỏ nhất còn ~45%)
      const frac = pp.maxBites ? pp.bites / pp.maxBites : 1;
      drawPoopShape(10 * (0.45 + 0.55 * frac));
      ctx.restore();
    }
  }

  function drawParticles() {
    for (const pt of particles) {
      ctx.globalAlpha = Math.max(0, pt.life);
      ctx.fillStyle = pt.color;
      ctx.beginPath();
      ctx.arc(pt.x, pt.y, pt.size, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  // vẽ 1 sợi lông: hình giọt/lá có sống lông ở giữa, nghiêng theo hướng chao
  function drawFeathers() {
    for (const ft of feathers) {
      ctx.save();
      ctx.globalAlpha = Math.max(0, Math.min(1, ft.life));
      ctx.translate(ft.x, ft.y);
      ctx.rotate(ft.rot + Math.sin(ft.sway) * 0.5);
      const w = ft.size * 0.6, h = ft.size;
      // phiến lông
      ctx.fillStyle = ft.color;
      ctx.strokeStyle = selectedSkin.stroke;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(0, -h);
      ctx.quadraticCurveTo(w, -h * 0.2, 0, h);
      ctx.quadraticCurveTo(-w, -h * 0.2, 0, -h);
      ctx.fill();
      ctx.stroke();
      // sống lông
      ctx.strokeStyle = "rgba(0,0,0,0.25)";
      ctx.beginPath();
      ctx.moveTo(0, -h);
      ctx.lineTo(0, h);
      ctx.stroke();
      ctx.restore();
    }
    ctx.globalAlpha = 1;
  }

  function drawCountdown() {
    if (state !== STATE.PLAYING || countdown <= 0) return;
    const label = Math.ceil(countdown / 1000);   // 3 → 2 → 1
    const frac = (countdown % 1000) / 1000;        // 1 → 0 mỗi giây
    const scale = 0.7 + frac * 0.6;                // phồng to rồi thu nhỏ
    ctx.save();
    ctx.translate(W / 2, H / 2 - 20);
    ctx.scale(scale, scale);
    ctx.globalAlpha = Math.min(1, frac * 1.5);
    ctx.fillStyle = "#fff";
    ctx.strokeStyle = "#000";
    ctx.lineWidth = 7;
    ctx.font = "bold 130px Segoe UI, sans-serif";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.strokeText(label, 0, 0);
    ctx.fillText(label, 0, 0);
    ctx.restore();
    ctx.textBaseline = "alphabetic";
  }

  function drawFlash() {
    if (flash > 0.01) {
      ctx.fillStyle = `rgba(255,255,255,${flash})`;
      ctx.fillRect(0, 0, W, H);
    }
  }

  function render() {
    // Map hệ toạ độ logic (W×H) lên backing store thật để nét ở mọi độ phân giải.
    ctx.setTransform(canvas.width / W, 0, 0, canvas.height / H, 0, 0);
    ctx.clearRect(0, 0, W, H);

    ctx.save();
    // rung màn hình khi va chạm
    if (shake > 0.1) {
      ctx.translate((Math.random() - 0.5) * shake, (Math.random() - 0.5) * shake);
    }
    drawBackground();
    drawWeatherTint();     // ám màu trời theo thời tiết
    drawClouds();
    drawExtraClouds();     // mây dày thêm khi "cloudy"
    for (const p of pipes) drawPipe(p);
    drawPowerups();
    drawWater();
    drawBird();
    drawFeathers();
    drawPoops();
    drawParticles();
    drawFloatTexts();
    drawPrecip();          // mưa/tuyết phủ lên cảnh vật
    drawFog();             // sương mù trên cùng
    ctx.restore();

    drawScore();      // điểm đứng yên, dễ đọc
    drawCountdown();
    drawFlash();       // chớp trắng phủ toàn màn
  }

  // hiệu ứng luôn cập nhật (kể cả khi OVER) — flash/shake tắt dần, cánh vỗ mượt
  function stepEffects(dt) {
    if (flash > 0) flash = Math.max(0, flash - 0.05 * dt);
    if (shake > 0) shake = Math.max(0, shake - 0.8 * dt);
    const wingSpeed = (state === STATE.PLAYING && bird.vy < 0) ? 0.75 : 0.35;
    wingPhase += wingSpeed * dt;

    // hạt mưa/tuyết: rơi liên tục, vòng lại lên đỉnh khi chạm đáy (thuần trang trí)
    if (precip.length) {
      if (weather === "rain") {
        for (const d of precip) {
          d.y += d.spd * dt;
          d.x += d.spd * 0.35 * dt;          // mưa rơi hơi chéo theo gió
          if (d.y > H) { d.y = -d.len; d.x = Math.random() * (W + 60) - 30; }
          if (d.x > W + 30) d.x -= (W + 60);
        }
      } else if (weather === "snow") {
        for (const d of precip) {
          d.sway += d.swaySpeed * dt;
          d.y += d.spd * dt;
          d.x += Math.sin(d.sway) * 0.6 * dt; // bông tuyết chao qua lại
          if (d.y > H) { d.y = -d.r; d.x = Math.random() * (W + 60) - 30; }
        }
      }
    }

    // lông rơi: trọng lực nhẹ, chao đảo ngang như lông thật, cuộn theo nền khi đang chơi
    if (feathers.length) {
      const scroll = (state === STATE.PLAYING && !paused && countdown <= 0)
        ? currentSpeed() * (slowTimer > 0 ? POWER.SLOW_FACTOR : 1) * dt * 0.4
        : 0;
      for (const ft of feathers) {
        ft.sway += ft.swaySpeed * dt;
        ft.vy += 0.04 * dt;                   // rơi chậm (nhẹ như lông)
        if (ft.vy > 1.4) ft.vy = 1.4;         // giới hạn tốc rơi
        ft.x += (ft.vx + Math.sin(ft.sway) * 0.9) * dt - scroll;
        ft.y += ft.vy * dt;
        ft.vx *= Math.pow(0.94, dt);          // cản không khí phương ngang
        ft.rot += ft.vr * dt + Math.sin(ft.sway) * 0.02 * dt;
        ft.life -= ft.fade * dt;
      }
      feathers = feathers.filter(ft => ft.life > 0 && ft.y - 10 < H - GROUND_H);
    }
  }

  function loop(now) {
    if (!lastT) lastT = now;
    let dt = (now - lastT) / (1000 / 60); // chuẩn hóa: 1.0 khi đúng 60fps
    lastT = now;
    if (dt > 3) dt = 3;                    // chặn nhảy vọt khi tab bị treo/chuyển
    update(dt);
    stepEffects(dt);
    stepWater(dt);
    render();
    requestAnimationFrame(loop);
  }

  // ---- Điều khiển ----
  function onInput(e) {
    if (e.type === "keydown") {
      if (e.code === "KeyP" || e.code === "Escape") {
        e.preventDefault();
        togglePause();
        return;
      }
      if (e.code !== "Space" && e.code !== "ArrowUp") return;
      e.preventDefault();
    }
    if (state === STATE.PLAYING) flap();
    else if (state === STATE.READY) startGame();
    // khi OVER: dùng nút "Chơi lại" để tránh restart ngoài ý muốn
  }

  document.addEventListener("keydown", onInput);
  canvas.addEventListener("mousedown", onInput);
  canvas.addEventListener("touchstart", (e) => { e.preventDefault(); onInput(e); }, { passive: false });

  startBtn.addEventListener("click", (e) => { e.stopPropagation(); startGame(); });

  // ---- Bộ chọn nhân vật ----
  const birdPicker = document.getElementById("birdPicker");
  function buildPicker() {
    birdPicker.innerHTML = "";
    SKINS.forEach(skin => {
      const opt = document.createElement("div");
      opt.className = "bird-opt" + (skin.id === selectedSkin.id ? " selected" : "");
      opt.title = skin.name;
      const dot = document.createElement("span");
      dot.className = "bird-dot";
      dot.style.background = skin.body;
      dot.style.borderColor = skin.stroke;
      opt.appendChild(dot);
      opt.addEventListener("click", (e) => {
        e.stopPropagation();
        selectedSkin = skin;
        localStorage.setItem("flappySkin", skin.id);
        birdPicker.querySelectorAll(".bird-opt").forEach(o => o.classList.remove("selected"));
        opt.classList.add("selected");
      });
      birdPicker.appendChild(opt);
    });
  }
  buildPicker();

  // nút bật/tắt nhạc nền
  const muteBtn = document.getElementById("muteBtn");
  muteBtn.addEventListener("click", (e) => {
    e.stopPropagation();
    const on = Sound.toggleMusic();
    muteBtn.textContent = on ? "🔊" : "🔇";
    if (on && state === STATE.PLAYING) Sound.startMusic();
  });

  // nút chế độ Ngày/Đêm
  const dayNightBtn = document.getElementById("dayNightBtn");
  dayNightBtn.addEventListener("click", (e) => {
    e.stopPropagation();
    isNight = !isNight;
    dayNightBtn.textContent = isNight ? "☀️" : "🌙";
    dayNightBtn.title = isNight ? "Chuyển sang Ngày" : "Chuyển sang Đêm";
  });

  // ---- Khởi động ----
  reset();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
